name: Nightly Smoke

on:
  workflow_dispatch:
  schedule:
    # 02:00 Asia/Shanghai every day
    - cron: '0 18 * * *'

jobs:
  nightly-smoke:
    name: Run migration + test-support smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: true
      SMOKE_PG_PORT: '55433'
      SMOKE_DB_NAME: moy_smoke
      SMOKE_BACKEND_PORT: '3006'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Migration smoke
        run: npm --prefix frontend run test:smoke:migration

      - name: Test-support smoke
        run: npm --prefix frontend run test:smoke:test-support
